<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Pulse</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth">
  <div class="auth-box">
    <div class="auth-logo"><div class="auth-logo-dot"></div> Pulse</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="tabs">
      <button class="tab {% if tab != 'signup' %}on{% endif %}" onclick="sw('login')">Sign In</button>
      <button class="tab {% if tab == 'signup' %}on{% endif %}" onclick="sw('signup')">Sign Up</button>
    </div>
    <div class="panel {% if tab != 'signup' %}on{% endif %}" id="pLogin">
      <form action="/login" method="post">
        <div class="fg"><label>Username</label><input name="username" class="fi" placeholder="admin" required></div>
        <div class="fg"><label>Password</label><input name="password" type="password" class="fi" placeholder="••••••••" required></div>
        <button type="submit" class="btn primary" style="width:100%;margin-top:4px">Sign In</button>
      </form>
    </div>
    <div class="panel {% if tab == 'signup' %}on{% endif %}" id="pSignup">
      <form action="/signup" method="post">
        <div class="fg"><label>Username</label><input name="username" class="fi" placeholder="Choose username" required></div>
        <div class="fg"><label>Password</label><input name="password" type="password" class="fi" placeholder="Min 6 chars" required></div>
        <div class="fg"><label>Confirm</label><input name="confirm" type="password" class="fi" placeholder="Confirm password" required></div>
        <button type="submit" class="btn primary" style="width:100%;margin-top:4px">Create Account</button>
      </form>
    </div>
    <div style="margin-top:16px;font-size:11px;color:var(--t2)"><a href="/" style="color:var(--t2)">← back</a></div>
  </div>
</div>
<script src="/static/main.js"></script>
<script src="/static/login.js"></script>
</body>
</html>
