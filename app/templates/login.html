<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #06060a; color: #e0e0e0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%;
            filter: blur(120px); opacity: 0.12; z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        body::before { width: 500px; height: 500px; background: #4caf50; top: -100px; left: -100px; }
        body::after { width: 400px; height: 400px; background: #2196f3; bottom: -100px; right: -100px; animation-delay: -10s; }
        @keyframes float {
            0%, 100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-30px) scale(1.05); }
            66% { transform: translate(-20px,20px) scale(0.95); }
        }

        .login-card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 40px 36px; backdrop-filter: blur(20px);
            width: 400px; max-width: 90vw; animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .login-header { text-align: center; margin-bottom: 28px; }
        .login-logo {
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.15);
            display: inline-flex; align-items: center; justify-content: center;
            color: #4caf50; margin-bottom: 16px;
        }
        .login-logo i { width: 24px; height: 24px; }
        .login-header h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .login-header p { font-size: 13px; color: #555; }

        /* Tabs */
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
        .tab {
            padding: 9px; border-radius: 8px; border: none; background: transparent;
            color: #666; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.25s;
        }
        .tab.active { background: rgba(76,175,80,0.15); color: #fff; }
        .tab:hover:not(.active) { color: #aaa; }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; color: #555; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #444; pointer-events: none; }
        .input-wrapper input {
            width: 100%; padding: 12px 14px 12px 40px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
            color: #eee; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.25s;
        }
        .input-wrapper input:focus { outline: none; border-color: rgba(76,175,80,0.5); box-shadow: 0 0 0 3px rgba(76,175,80,0.08); }
        .input-wrapper input::placeholder { color: #3a3a3a; }

        .btn-submit {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: #4caf50; color: #fff;
            font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.25s;
        }
        .btn-submit:hover { background: #43a047; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(76,175,80,0.25); }

        .error-msg {
            background: rgba(244,67,54,0.08); border: 1px solid rgba(244,67,54,0.2);
            border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
            font-size: 12px; color: #f44336; display: flex; align-items: center; gap: 8px;
        }
        .error-msg i { width: 14px; height: 14px; flex-shrink: 0; }

        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { font-size: 12px; color: #444; text-decoration: none; }
        .back-link a:hover { color: #888; }

        .pw-hint { font-size: 11px; color: #333; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo"><i data-lucide="zap"></i></div>
            <h1 id="formTitle">Welcome back</h1>
            <p id="formSubtitle">Sign in to access the admin panel</p>
        </div>

        {% if error %}
        <div class="error-msg"><i data-lucide="alert-circle"></i> {{ error }}</div>
        {% endif %}

        <div class="tabs">
            <button class="tab {% if tab != 'signup' %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
            <button class="tab {% if tab == 'signup' %}active{% endif %}" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div class="form-panel {% if tab != 'signup' %}active{% endif %}" id="loginPanel">
            <form action="/login" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input name="username" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input name="password" type="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>

        <!-- SIGNUP -->
        <div class="form-panel {% if tab == 'signup' %}active{% endif %}" id="signupPanel">
            <form action="/signup" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user-plus"></i>
                        <input name="username" placeholder="Choose a username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input name="password" type="password" placeholder="Create a password" required>
                    </div>
                    <div class="pw-hint">Minimum 6 characters</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="shield-check"></i>
                        <input name="confirm" type="password" placeholder="Confirm password" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
        </div>

        <div class="back-link"><a href="/">← Back to home</a></div>
    </div>

    <script>
    lucide.createIcons();
    function switchTab(tab) {
        document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
        document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
        document.getElementById('formTitle').textContent = tab === 'login' ? 'Welcome back' : 'Create account';
        document.getElementById('formSubtitle').textContent = tab === 'login' ? 'Sign in to access the admin panel' : 'Register to start monitoring';
    }
    </script>
</body>
</html>
