<!DOCTYPE html>
<html>
<head>
    <title>Pulse Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #222;
        }

        tr:hover {
            background: #2a2a2a;
        }

        .up {
            color: #4caf50;
        }

        .down {
            color: #f44336;
        }
    </style>
</head>
<body>

<h1>Pulse Dashboard</h1>

<table>
    <tr>
        <th>Name</th>
        <th>URL</th>
        <th>Status</th>
        <th>Uptime</th>
    </tr>

    {% for s in services %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.url }}</td>
        <td class="{{ s.status }}">{{ s.status }}</td>
        <td>{{ s.uptime }}%</td>
    </tr>
    {% endfor %}
</table>

<script>
setInterval(() => {
    window.location.reload();
}, 5000); // refresh every 5 sec
</script>

</body>
</html>
